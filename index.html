<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EnConvo Settings User Guide v3</title>
  <link rel="icon" type="image/png" href="assets/enconvo_icon_gold_no_bg.png">
  <style>
    :root {
      color-scheme: light;
      --primary: #2563eb;
      --primary-soft: #eff6ff;
      --text: #151922;
      --muted: #5c6675;
      --border: #d9dee7;
      --soft: #f6f8fb;
      --warn: #fff8e6;
      --sidebar: 304px;
      --toc: 232px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--text);
      background: #fff;
      font: 15.5px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .navbar {
      position: sticky;
      top: 0;
      z-index: 30;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(10px);
    }
    .brand { display: flex; align-items: center; gap: 10px; color: var(--text); font-weight: 750; }
    .mark {
      width: 26px;
      height: 26px;
      display: block;
      object-fit: contain;
    }
    .toplinks { display: flex; gap: 18px; align-items: center; font-size: 13px; }
    .layout {
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr) var(--toc);
      min-height: calc(100vh - 58px);
    }
    .sidebar, .toc {
      position: sticky;
      top: 58px;
      height: calc(100vh - 58px);
      overflow: auto;
      background: #fff;
    }
    .sidebar { padding: 20px 14px 28px 22px; border-right: 1px solid var(--border); }
    .toc { padding: 34px 20px 30px 18px; border-left: 1px solid var(--border); }
    .sidebar-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
    }
    details { margin: 2px 0; }
    summary {
      padding: 7px 9px;
      border-radius: 7px;
      color: #2b3442;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 650;
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before {
      content: "›";
      display: inline-block;
      width: 12px;
      margin-right: 4px;
      color: #7b8796;
      transform: rotate(0deg);
      transition: transform .12s ease;
    }
    details[open] > summary::before { transform: rotate(90deg); }
    summary:hover, .sidebar a:hover { background: var(--primary-soft); text-decoration: none; }
    .tree { margin: 2px 0 8px 12px; padding-left: 10px; border-left: 1px solid #e4e8ef; }
    .sidebar a {
      display: block;
      padding: 5px 8px;
      border-radius: 6px;
      color: #4a5565;
      font-size: 12.75px;
    }
    .sidebar .branch > summary {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .sidebar .branch > summary a,
    .sidebar .branch > summary span {
      flex: 1;
      min-width: 0;
      color: #2b3442;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sidebar .branch > summary a {
      padding: 0;
      font-size: inherit;
      font-weight: inherit;
    }
    .sidebar .branch > summary a:hover { background: transparent; }
    .sidebar .leaf { padding-left: 18px; }
    .sidebar .deep-link { color: #6b7280; }
    .doc-shell { display: flex; justify-content: center; min-width: 0; }
    .doc { width: min(100%, 980px); padding: 30px 48px 82px; }
    .breadcrumbs { display: none; }
    h1, h2, h3, h4 { line-height: 1.25; letter-spacing: 0; scroll-margin-top: 78px; }
    h1 { margin: 0 0 14px; font-size: 44px; font-weight: 820; }
    h2 { margin: 42px 0 12px; padding-top: 0; border-top: 0; font-size: 30px; }
    #global-providers > h2 { margin-top: 0; }
    h3 { margin: 30px 0 10px; font-size: 22px; }
    h4 { margin: 24px 0 8px; font-size: 18px; }
    p { margin: 0 0 14px; }
    .lead { color: #343b47; font-size: 18px; line-height: 1.7; }
    .note { display: none; }
    .grid { display: grid; gap: 28px; }
    .page-card, .deep-card {
      border: 0;
      border-radius: 0;
      background: transparent;
      overflow: visible;
    }
    .page-card { padding: 0; }
    .deep-card { margin: 26px 0; }
    .deep-body { padding: 0; }
    .embedded-section { margin-top: 26px; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 21px;
      margin: 0 6px 8px 0;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: #1d4ed8;
      font-size: 11.5px;
      font-weight: 700;
    }
    .badge.private { background: #fff1f2; color: #be123c; }
    .shot {
      display: block;
      margin: 14px 0 0;
      border: 0;
      border-radius: 0;
      background: #fff;
      overflow: hidden;
    }
    .shot-button {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: zoom-in;
      text-align: left;
    }
    .shot img { display: block; width: 100%; height: auto; border-radius: 4px; transition: filter .18s ease; }
    .shot-button:hover img { filter: saturate(1.03) brightness(.99); }
    .lightbox[hidden] { display: none; }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: rgba(12, 16, 24, .86);
      backdrop-filter: blur(8px);
    }
    .lightbox-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      color: #f8fafc;
      border-bottom: 1px solid rgba(255,255,255,.16);
    }
    .lightbox-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 720;
    }
    .lightbox-actions { display: flex; align-items: center; gap: 8px; }
    .lightbox-actions button,
    .lightbox-actions a {
      min-width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 7px;
      color: #f8fafc;
      background: rgba(255,255,255,.09);
      font: 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      cursor: pointer;
    }
    .lightbox-actions button:hover,
    .lightbox-actions a:hover {
      background: rgba(255,255,255,.18);
      text-decoration: none;
    }
    .lightbox-stage {
      min-height: 0;
      overflow: auto;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .lightbox-stage img {
      display: block;
      max-width: none;
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0,0,0,.38);
      transform-origin: center center;
    }
    .lightbox.fit .lightbox-stage img {
      max-width: 100%;
      max-height: calc(100vh - 112px);
      width: auto;
      height: auto;
    }
    .mini-list { margin: 8px 0 0; padding-left: 18px; }
    .mini-list li { margin: 5px 0; }
    .inventory {
      display: block;
      margin: 12px 0 0;
      padding-left: 20px;
      list-style: disc;
    }
    .inventory li {
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #334155;
      font-size: 14px;
      line-height: 1.55;
      margin: 5px 0;
    }
    .toc strong { display: block; margin-bottom: 10px; font-size: 13px; }
    .toc a { display: block; padding: 5px 0 5px 10px; color: var(--muted); font-size: 12.75px; }
    code { padding: .13rem .3rem; border-radius: 4px; background: var(--soft); font: .9em ui-monospace, SFMono-Regular, Menlo, monospace; }
    footer { margin-top: 52px; padding-top: 18px; border-top: 1px solid var(--border); color: var(--muted); font-size: 13px; }
    @media (max-width: 1120px) {
      .layout { grid-template-columns: var(--sidebar) minmax(0, 1fr); }
      .toc { display: none; }
    }
    @media (max-width: 780px) {
      .toplinks { display: none; }
      .layout { display: block; }
      .sidebar {
        position: static;
        height: auto;
        max-height: 56vh;
        padding: 14px 14px 16px;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
      .sidebar #sidebar { max-height: calc(56vh - 54px); overflow: auto; }
      .tree { margin-left: 7px; padding-left: 8px; }
      summary { padding: 8px 7px; }
      .sidebar a { padding: 7px 8px; }
      .sidebar .leaf { padding-left: 10px; }
      .doc { padding: 28px 20px 58px; }
      h1 { font-size: 34px; }
      h2 { font-size: 26px; }
      .page-card { padding: 0; }
      .lightbox-bar { align-items: flex-start; }
      .lightbox-actions { flex-wrap: wrap; justify-content: flex-end; }
      .lightbox-stage { padding: 12px; place-items: start center; }
      .lightbox.fit .lightbox-stage img { max-height: calc(100vh - 150px); }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="#global-providers"><img class="mark" src="assets/enconvo_icon_gold_no_bg.png" alt="" aria-hidden="true"><span>EnConvo Settings</span><span>v3</span></a>
    <div class="toplinks">
      <a href="#global-providers">Global Providers</a>

  <div class="layout">
    <aside class="sidebar">
      <p class="sidebar-title">User Guide v3</p>
      <div id="sidebar"></div>
    </aside>
    <div class="doc-shell">
      <main class="doc">
        <article>
          <div id="guide"></div>
        </article>
        <footer>
          Local assets: <code>screenshots/</code>. Project notes: <code>capture-log.md</code>. Review sensitive screenshots before sharing this guide outside your workspace.
        </footer>
      </main>

    <aside class="toc">

      <div class="lightbox-title" id="viewerTitle">Screenshot</div>
      <div class="lightbox-actions">
        <button type="button" id="viewerFit" title="Fit to screen">Fit</button>
        <button type="button" id="viewerZoomOut" title="Zoom out">-</button>
        <button type="button" id="viewerZoomIn" title="Zoom in">+</button>
        <a id="viewerOriginal" href="#" target="_blank" rel="noopener" title="Open original image">Original</a>
        <button type="button" id="viewerClose" title="Close viewer">Close</button>

      <img id="viewerImage" alt="">
    </div>

  <script>
    const sections = [
      {
        id: "global-providers",
        title: "Global Providers Settings",
        intro: "These panes set EnConvo-wide provider defaults. Agents inherit these defaults unless their own settings override them.",
        pages: [
          ["01-ai-model.png", "AI Model", "Choose the app-wide model provider that new agents inherit.", "Start here before configuring individual agents. Select the provider, credential, model, reasoning effort, and temperature that should be the normal baseline, then use agent-level AI Model settings only for exceptions.", "Provider"],
          ["02-text-to-speech.png", "Text-to-Speech", "Choose the app-wide voice provider for spoken responses.", "Configure the provider, credential, voice, language, output format, and speech speed that agents should inherit. Use a direct provider when you manage its credential, or a Cloud Plan option when EnConvo should manage access.", "Voice"],
          ["03-web-search.png", "Web Search", "Choose the backend EnConvo uses when agents need search context.", "Configure this before relying on agents for current web or social-search research. Confirm the search credential and model, then set the provider as default only after the connection is ready.", "Provider"],
          ["04-image-generation.png", "Image Generation", "Choose the default provider for image creation and editing workflows.", "Use this page to decide whether image generation should run through EnConvo Cloud models or through a credential you manage. Confirm the model before making it the global default.", "Media"],
          ["05-video-generation.png", "Video Generation", "Choose the default provider and output settings for generated videos.", "Set the provider, credential, model, duration, aspect ratio, and resolution that video commands should inherit. Treat these as production defaults because they affect cost, speed, and output format.", "Media"],
          ["06-web-fetch.png", "Web Fetch", "Choose how EnConvo retrieves URL content for agents and commands.", "Use Local Fetch for simple webpage extraction, or configure a provider-backed reader when you need stronger extraction. Tune length, start index, and raw HTML only for workflows that need those changes.", "Provider"],
          ["07-ocr.png", "OCR", "Choose the default engine for extracting text from images and documents.", "Use this when agents need to read images, UI captures, PDFs, or scanned documents. Pick a local recognizer for simple private OCR, or an AI-model OCR provider when layout interpretation matters.", "Provider"]
        ]
      },
      {
        id: "global-ai-model",
        title: "AI Model",
        parent: "global-providers",
        parentPage: "AI Model",
        intro: "Use this section when choosing the app-wide AI model provider. These settings become the default model behavior for new agents unless an agent has its own AI Model override.",
        pages: [
          ["global-ai-model/enconvo-cloud-plan-01-overview.png", "EnConvo Cloud Plan Overview", "Use EnConvo Cloud Plan when you want model access managed by your subscription.", "Choose this route when you do not want to maintain separate provider credentials. Select the model, reasoning effort, and temperature that should become the app-wide baseline, then set it as default only after those choices match your normal workflow.", "Provider"],
          ["global-ai-model/enconvo-cloud-plan-gpt-54-mini-example.png", "EnConvo Cloud Plan GPT-5.4 mini Example", "Use GPT-5.4 mini as a typical Cloud Plan model example.", "Open Model Name, choose GPT-5.4 mini, then adjust Temperature only if you want a different response style. Use Set as Default Provider only when this Cloud Plan setup should become the app-wide default.", "Provider"],
          ["global-ai-model/openai-04-credential-type-menu.png", "OpenAI Credential Type Menu", "Choose whether OpenAI should connect by browser authorization or API key.", "Select OAuth2 when you want EnConvo to authorize through an OpenAI account. Select ApiKey when you want to paste a provider key, choose the API type, and control the base URL manually.", "Private"],
          ["global-ai-model/openai-05-apikey-setup.png", "OpenAI ApiKey Setup", "Configure OpenAI with a provider key and endpoint settings.", "Use ApiKey when EnConvo should call OpenAI directly with your key. Enter the API key, confirm the API type and base URL, then validate only when you are ready to test the credential.", "Private"],
          ["global-ai-model/openai-06-apikey-api-type-menu.png", "OpenAI API Type Menu", "Choose the API type for an OpenAI ApiKey credential.", "Use API Type to choose the OpenAI-compatible request mode exposed by the credential sheet. Standard OpenAI setups typically use the default OpenAI API type and base URL.", "Private"],
          ["global-ai-model/openai-03-oauth-sheet.png", "OpenAI OAuth2 Credential Sheet", "Connect OpenAI through browser-based account authorization.", "Use OAuth2 when you want EnConvo to rely on an authorized OpenAI account instead of a pasted API key. Start Connect or Reconnect only when you are ready to complete the browser flow.", "Private"],
          ["global-ai-model/openai-oauth-cycle-01-connect-sheet.png", "OpenAI OAuth2 Connect or Reconnect", "Start the OpenAI OAuth2 browser authorization cycle.", "Click Connect or Reconnect to OpenAI only when you are ready to refresh the account authorization. EnConvo will hand the flow to the browser and wait for the callback.", "Private"],
          ["global-ai-model/openai-oauth-cycle-02-connecting.png", "OpenAI OAuth2 Connecting State", "EnConvo waits while the browser authorization starts.", "After clicking Connect or Reconnect, the button changes to Connecting. Leave EnConvo open and continue in the browser window that appears.", "Private"],
          ["global-ai-model/openai-oauth-cycle-03-browser-account.png", "OpenAI OAuth2 Browser Account", "Choose the OpenAI account in the browser.", "Select the account you want EnConvo to use. Confirm the account identity before continuing, especially when Chrome has multiple OpenAI accounts signed in.", "Private"],
          ["global-ai-model/openai-oauth-cycle-04-browser-consent.png", "OpenAI OAuth2 Browser Consent", "Review the OpenAI consent page before continuing.", "Read the authorization details, then continue only if this is the account and permission set you want EnConvo to use.", "Private"],
          ["global-ai-model/openai-oauth-cycle-05-browser-success.png", "OpenAI OAuth2 Browser Success", "Finish the browser step and return to EnConvo.", "When the browser reports success, go back to the EnConvo credential sheet. Keep the browser address private because it may contain a temporary authorization code during the handoff.", "Private"],
          ["global-ai-model/openai-oauth-cycle-06-enconvo-connected.png", "OpenAI OAuth2 Connected State", "Confirm OpenAI authorization before closing the credential sheet.", "Close the sheet only after the OpenAI credential reports Connected. Use Reconnect later only when you need to repair authorization or switch the linked account.", "Private"],
          ["global-ai-model/anthropic-04-credential-type-menu.png", "Anthropic Credential Type Menu", "Choose how the Anthropic credential should authenticate.", "Select OAuth2 for browser-based Anthropic account authorization, or ApiKey when you want to enter a Claude API key and keep the standard Anthropic API base URL.", "Private"],
          ["global-ai-model/anthropic-05-apikey-setup.png", "Anthropic API Key Setup", "Use the ApiKey branch for a Claude API key credential.", "Enter the Claude API key, keep the Anthropic API Base URL on https://api.anthropic.com unless you intentionally use a compatible proxy, then validate only when you are ready to test the credential.", "Private"],
          ["global-ai-model/anthropic-03-oauth-credential-sheet.png", "Anthropic OAuth2 Credential Sheet", "Use the OAuth2 branch for browser-based Anthropic authorization.", "Use OAuth2 when you want EnConvo to connect through Anthropic account authorization. Review the connection state and use Reconnect only when you intentionally need to refresh the account link.", "Private"],
          ["global-ai-model/anthropic-oauth-cycle-01-choose-oauth2.png", "Anthropic OAuth2 Choose OAuth2", "Select the OAuth2 branch in the Anthropic credential sheet.", "Use the Credentials Type menu to switch from ApiKey to OAuth2 when you want browser-based Anthropic authorization instead of a Claude API key.", "Private"],
          ["global-ai-model/anthropic-oauth-cycle-02-connect-anthropic.png", "Anthropic OAuth2 Connect or Reconnect", "Start the Anthropic OAuth2 browser authorization cycle.", "Click Connect or Reconnect to Anthropic only when you are ready to authorize the account in the browser.", "Private"],
          ["global-ai-model/anthropic-oauth-cycle-03-browser-authorize.png", "Anthropic OAuth2 Browser Authorize", "Review the Anthropic browser authorization page.", "Confirm the account and requested access, then authorize only if this is the Anthropic account you want EnConvo to use.", "Private"],
          ["global-ai-model/anthropic-oauth-cycle-04-copy-code.png", "Anthropic OAuth2 Copy Code", "Copy the Anthropic authorization code from the browser.", "Use Copy Code, then return immediately to EnConvo. Treat the authorization code and callback URL as private.", "Private"],
          ["global-ai-model/anthropic-oauth-cycle-05-code-copied.png", "Anthropic OAuth2 Code Copied", "Return to EnConvo after copying the Anthropic authorization code.", "After copying the code, switch back to EnConvo immediately and continue in the OAuth Authentication dialog. Treat the copied code as a temporary secret.", "Private"],
          ["global-ai-model/anthropic-oauth-cycle-06-complete-login.png", "Anthropic OAuth2 Complete Login", "Finish the Anthropic OAuth2 handoff in EnConvo.", "Paste the copied code into EnConvo, complete login, then verify that the credential returns to a connected Anthropic state.", "Private"],
          ["global-ai-model/anthropic-02-model-menu.png", "Anthropic Model Menu", "Choose the Claude model for the global AI Model default.", "Use the model menu to choose the Claude family and version that should power new agents when Anthropic is the global default. Pair the model with an appropriate Reasoning Effort before changing the default provider.", "Provider"],
          ["global-ai-model/gemini-04-credential-type-menu.png", "Google Gemini AI Credential Type Menu", "Choose how the Gemini credential should authenticate.", "Select OAuth2 for browser-based Google authorization, or ApiKey when you want to enter a Google AI API key and base URL manually.", "Private"],
          ["global-ai-model/gemini-05-apikey-setup.png", "Google Gemini AI API Key Setup", "Use the ApiKey branch for a Google AI API key credential.", "Enter the Google AI API key, keep the Google AI API Base URL on the default generativelanguage.googleapis.com endpoint unless you intentionally use a compatible endpoint, then validate only when ready.", "Private"],
          ["global-ai-model/gemini-03-oauth-credential-sheet.png", "Google Gemini AI OAuth2 Credential Sheet", "Use the OAuth2 branch for browser-based Google authorization.", "Use OAuth2 when you want EnConvo to connect through a Google account. Review the connected account state and reconnect only when you intend to repair or change the account link.", "Private"],
          ["global-ai-model/gemini-02-model-menu.png", "Google Gemini AI Model Menu", "Choose the Gemini model for the global AI Model default.", "Use this menu to choose the Gemini model version. Gemini also exposes Google Search Tool, URL Context Tool, and Show thoughts switches, so enable those only when the global model should use those capabilities.", "Provider"],
          ["global-ai-model/ollama-02-model-menu.png", "Ollama Model Menu", "Choose a local or locally proxied model for Ollama.", "Use this menu after Ollama is running and the desired models are available. Local models depend on the Ollama service and installed model list on this Mac; this provider does not use an OAuth2 setup sheet.", "Local"],
          ["global-ai-model/groq-03-apikey-setup.png", "Groq AI API Key Setup", "Use the API-key sheet to configure Groq access.", "Enter the Groq API key, keep the Groq API Base URL on https://api.groq.com/openai/v1 unless you intentionally use a compatible gateway, then validate only when ready.", "Private"],
          ["global-ai-model/groq-02-model-menu.png", "Groq AI Model Menu", "Choose a Groq-hosted model for the global AI Model default.", "Use this menu after the Groq credential is configured. Choose the model that fits the workload, then adjust Temperature before setting Groq AI as the default.", "Private"],
          ["global-ai-model/zai-03-apikey-setup.png", "Z.AI GLM API Key Setup", "Use the API-key sheet to configure Z.AI access.", "Enter the Z.AI API key, then validate only when you are ready to test the credential. Z.AI does not expose an OAuth2 branch in this provider sheet.", "Private"],
          ["global-ai-model/zai-02-model-menu.png", "Z.AI GLM Model Menu", "Choose a Z.AI / GLM model after the credential is configured.", "If the model list is empty, configure or validate the Z.AI credential first, then refresh the model list before setting Z.AI as the default provider.", "Private"]

              "agent-mavis/anthropic-oauth-01-choose-oauth2.png",
              "agent-mavis/anthropic-oauth-02-connect-anthropic.png",
              "agent-mavis/anthropic-oauth-03-authorize.png",
              "agent-mavis/anthropic-oauth-04-copy-code.png",
              "agent-mavis/anthropic-oauth-05-copied-code.png",
              "agent-mavis/anthropic-oauth-06-complete-login-done.png"
            ],
            badge: "Private"
          },
          {
            title: "Tools Manager",
            proof: "agent-mavis/tools-manage-full-scroll.png",
            summary: "Use Tools > Manage to choose the capabilities Mavis can call, and expand tool rows when you need row-level settings.",
            steps: [
              "Open Tools, then click Manage.",
              "Review enabled tools at the top of the manager.",
              "Scroll through the tool groups to see optional app, AI, media, knowledge, and writing capabilities.",
              "Expand row chevrons when you need row-level settings.",
              "Toggle tools only when you want to change what this agent can use."
            ],
            evidence: [
              "agent-mavis/tools-manage-01-top.png",
              "agent-mavis/tools-manage-02-middle.png",
              "agent-mavis/tools-manage-03-lower.png",
              "agent-mavis/tools-manage-04-bottom.png"
            ],
            badge: "Tools"
          },
          {
            title: "More Runtime Settings",
            proof: "agent-mavis/more-full-scroll.png",
            summary: "Use More to control how Mavis behaves at runtime, including context access, live desktop awareness, tutor behavior, run mode, response language, post-actions, and memory.",
            steps: [
              "Open More and review the top runtime settings.",
              "Scroll through lower and bottom runtime sections.",
              "Open Dynamic Context, Live Screen, Tutor Mode, Run Mode, Response Language, and Post Action dropdowns to choose the runtime behavior Mavis should use.",
              "Adjust switches and sliders only when you want to change the agent's runtime behavior."
            ],
            evidence: [
              "agent-mavis/more-01-top.png",
              "agent-mavis/more-02-lower.png",
              "agent-mavis/more-03-bottom.png"
            ],
            badge: "Runtime"
          }
        ]
      }
    ];

    const guide = document.getElementById("guide");
    const sidebar = document.getElementById("sidebar");
    const toc = document.getElementById("toc");
    const viewer = document.getElementById("imageViewer");
    const viewerImage = document.getElementById("viewerImage");
    const viewerTitle = document.getElementById("viewerTitle");
    const viewerOriginal = document.getElementById("viewerOriginal");
    const viewerFit = document.getElementById("viewerFit");
    const viewerZoomIn = document.getElementById("viewerZoomIn");
    const viewerZoomOut = document.getElementById("viewerZoomOut");
    const viewerClose = document.getElementById("viewerClose");
    const viewerStage = document.getElementById("viewerStage");
    let viewerZoom = 1;

    function slug(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    function badgeClass(label) {
      return label === "Private" ? "badge private" : "badge";
    }

    function shot(src, caption) {
      return `<figure class="shot"><button class="shot-button" type="button" data-src="screenshots/${src}" data-title="${caption}" aria-label="Open screenshot"><img src="screenshots/${src}" alt=""></button></figure>`;
    }

    const childNavGroups = {
      "global-ai-model": [
        { title: "Provider Inventory", pagePrefixes: ["AI Model Provider List"], deepTitles: ["AI Model Provider Inventory"], deepFirst: true },
        { title: "EnConvo Cloud Plan", pagePrefixes: ["EnConvo Cloud Plan"], deepTitles: ["EnConvo Cloud Plan Setup"], deepFirst: true },
        { title: "OpenAI", pagePrefixes: ["OpenAI"], deepPrefixes: ["OpenAI"], deepFirst: true },
        { title: "Anthropic", pagePrefixes: ["Anthropic"], deepTitles: ["Anthropic Global Provider Setup"], deepFirst: true },
        { title: "Google Gemini AI", pagePrefixes: ["Google Gemini AI"], deepTitles: ["Google Gemini AI Global Provider Setup"], deepFirst: true },
        { title: "Ollama", pagePrefixes: ["Ollama"], deepTitles: ["Ollama Global Provider Setup"], deepFirst: true },
        { title: "Groq AI", pagePrefixes: ["Groq AI"], deepTitles: ["Groq AI Global Provider Setup"], deepFirst: true },
        { title: "Z.AI / GLM", pagePrefixes: ["Z.AI GLM"], deepTitles: ["Z.AI GLM Global Provider Setup"], deepFirst: true }
      ],
      "global-text-to-speech": [
        {
          title: "Provider Inventory",
          deepTitles: ["Provider Inventory"],
          deepFirst: true
        },
        {
          title: "EnConvo Cloud Plan TTS",
          deepTitles: ["EnConvo Cloud Plan TTS"],
          deepFirst: true,
          children: [
            { title: "xAI TTS", pagePrefixes: ["xAI TTS Cloud Plan"] }
          ]
        },
        { title: "Edge TTS", pagePrefixes: ["Edge TTS"], deepTitles: ["Edge TTS Configuration"], deepFirst: true },
        { title: "OpenAI TTS", pagePrefixes: ["OpenAI TTS"], deepTitles: ["OpenAI TTS Configuration"], deepFirst: true },
        { title: "Gemini TTS", pagePrefixes: ["Gemini TTS"], deepTitles: ["Gemini TTS Configuration"], deepFirst: true },
        { title: "xAI TTS", pagePrefixes: ["xAI TTS"], deepTitles: ["xAI TTS Configuration"], deepFirst: true },
        { title: "Eleven Labs TTS", pagePrefixes: ["Eleven Labs TTS"], deepTitles: ["Eleven Labs TTS Configuration"], deepFirst: true },
        { title: "Kokoro MLX TTS", pagePrefixes: ["Kokoro MLX TTS"], deepTitles: ["Kokoro MLX TTS Configuration"], deepFirst: true },
        { title: "Qwen3 MLX TTS", pagePrefixes: ["Qwen3 MLX TTS"], deepTitles: ["Qwen3 MLX TTS Configuration"], deepFirst: true }
      ],
      "global-web-search": [
        { title: "Provider Inventory", deepTitles: ["Provider Inventory"], deepFirst: true },
        { title: "xAI X Search", pagePrefixes: ["xAI X Search"], deepTitles: ["xAI X Search Configuration"], deepFirst: true }
      ],
      "global-image-generation": [
        { title: "Provider Inventory", deepTitles: ["Provider Inventory"], deepFirst: true },
        { title: "EnConvo Cloud Image Models", pagePrefixes: ["EnConvo Cloud Image"], deepTitles: ["EnConvo Cloud Image Models"], deepFirst: true },
        { title: "OpenAI Image Generation", pagePrefixes: ["OpenAI Image"], deepTitles: ["OpenAI Image Generation Configuration"], deepFirst: true }
      ],
      "global-video-generation": [
        { title: "Provider Inventory", deepTitles: ["Provider Inventory"], deepFirst: true },
        { title: "xAI Video Generation", pagePrefixes: ["xAI Video", "Video Aspect Ratio", "Video Resolution"], deepTitles: ["xAI Video Generation Configuration"], deepFirst: true }
      ],
      "global-web-fetch": [
        { title: "Provider Inventory", deepTitles: ["Provider Inventory"], deepFirst: true },
        { title: "Local Fetch", pagePrefixes: ["Local Fetch"], deepTitles: ["Local Fetch Configuration"], deepFirst: true }
      ],
      "global-ocr": [
        { title: "Provider Inventory", deepTitles: ["Provider Inventory"], deepFirst: true },
        { title: "AI Model OCR", pagePrefixes: ["AI Model OCR", "OCR AI Model Provider", "OCR Model", "OCR Reasoning"], deepTitles: ["AI Model OCR Configuration"], deepFirst: true }
      ],
      "agent-mavis": [
        { title: "Change Agent Portrait", pagePrefixes: ["Change Agent Portrait"] },
        { title: "Agent Definition", pagePrefixes: ["Agent Definition"], deepTitles: ["Agent Definition Leaves"] },
        { title: "AI Model", pagePrefixes: ["AI Model"], deepPrefixes: ["AI Model", "Anthropic"] },
        { title: "Tools", pagePrefixes: ["Tools"], deepTitles: ["Tools Manager"] },
        { title: "Text to Speech", pagePrefixes: ["Text to Speech"] },
        { title: "More", pagePrefixes: ["More"], deepTitles: ["More Runtime Settings"] }
      ]
    };

    const flatChildSectionIds = new Set([
      "global-ai-model",
      "global-text-to-speech",
      "global-web-search",
      "global-image-generation",
      "global-video-generation",
      "global-web-fetch",
      "global-ocr"
    ]);

    function pageLink(section, page, className = "") {
      const label = page[1];
      return `<a class="${className}" href="#${section.id}-${slug(label)}">${label}</a>`;
    }

    function deepLink(section, item, className = "deep-link") {
      return `<a class="${className}" href="#${section.id}-${slug(item.title)}">${item.title}</a>`;
    }

    function matchesPrefix(text, prefixes = []) {
      const normalized = text.toLowerCase();
      return prefixes.some(prefix => normalized.startsWith(prefix.toLowerCase()));
    }

    function isSubpageOf(pageTitle, parentTitle) {
      return pageTitle.startsWith(`${parentTitle}: `);
    }

    function navOpen(depth) {
      const mobile = window.matchMedia("(max-width: 780px)").matches;
      return mobile ? "" : " open";
    }

    function renderChildNav(child, depth = 2) {
      const groups = childNavGroups[child.id];
      if (!groups) {
        const childPages = child.pages.map(cp => pageLink(child, cp)).join("");
        const deepLinks = (child.deepDive || []).map(d => deepLink(child, d)).join("");
        return `<details class="branch" data-depth="${depth}"${navOpen(depth)}><summary><a href="#${child.id}">${child.title}</a></summary><div class="tree">${childPages}${deepLinks}</div></details>`;
      }

      const usedPages = new Set();
      const usedDeep = new Set();
      const renderGroup = (group, groupDepth) => {
        const pages = child.pages.filter(page => !usedPages.has(page) && matchesPrefix(page[1], group.pagePrefixes || [group.title]));
        const deep = (child.deepDive || []).filter(item => {
          if (usedDeep.has(item)) return false;
          const exact = (group.deepTitles || []).includes(item.title);
          const prefixed = matchesPrefix(item.title, group.deepPrefixes || []);
          return exact || prefixed;
        });
        pages.forEach(page => usedPages.add(page));
        deep.forEach(item => usedDeep.add(item));
        const pageLinks = pages.map(page => pageLink(child, page, "leaf"));
        const deepLinks = deep.map(item => deepLink(child, item, "leaf deep-link"));
        const childLinks = (group.children || []).map(childGroup => renderGroup(childGroup, groupDepth + 1));
        const links = group.deepFirst
          ? [...deepLinks, ...pageLinks, ...childLinks].join("")
          : [...pageLinks, ...deepLinks, ...childLinks].join("");
        return `<details class="branch" data-depth="${groupDepth}"${navOpen(groupDepth)}><summary><span>${group.title}</span></summary><div class="tree">${links}</div></details>`;
      };
      const grouped = groups.map(group => renderGroup(group, depth + 1)).join("");

      const ungroupedPages = child.pages.filter(page => !usedPages.has(page)).map(page => pageLink(child, page, "leaf")).join("");
      const ungroupedDeep = (child.deepDive || []).filter(item => !usedDeep.has(item)).map(item => deepLink(child, item, "leaf deep-link")).join("");
      const overflow = ungroupedPages || ungroupedDeep
        ? `<details class="branch" data-depth="${depth + 1}"${navOpen(depth + 1)}><summary><span>Other</span></summary><div class="tree">${ungroupedPages}${ungroupedDeep}</div></details>`
        : "";

      if (flatChildSectionIds.has(child.id)) return `${grouped}${overflow}`;
      return `<details class="branch" data-depth="${depth}"${navOpen(depth)}><summary><a href="#${child.id}">${child.title}</a></summary><div class="tree">${grouped}${overflow}</div></details>`;
    }

    function renderSidebar() {
      const topSections = sections.filter(section => !section.parent);
      sidebar.innerHTML = topSections.map(section => {
        const children = sections.filter(child => child.parent === section.id);
        const pageLinks = section.pages.map(p => {
          const isNestedPage = section.pages.some(parentPage => parentPage !== p && isSubpageOf(p[1], parentPage[1]));
          if (isNestedPage) return "";
          const subPages = section.pages.filter(subPage => subPage !== p && isSubpageOf(subPage[1], p[1]));
          const subPageLinks = subPages.map(subPage => pageLink(section, subPage, "leaf")).join("");
          const childLinks = children
            .filter(child => child.parentPage === p[1])
            .map(child => renderChildNav(child, 2))
            .join("");
          if (subPageLinks || childLinks) {
            return `<details class="branch" data-depth="1"${navOpen(1)}><summary><a href="#${section.id}-${slug(p[1])}">${p[1]}</a></summary><div class="tree">${subPageLinks}${childLinks}</div></details>`;
          }
          return `<a href="#${section.id}-${slug(p[1])}">${p[1]}</a>`;
        }).join("");
        return `<details class="branch" data-depth="0"${navOpen(0)}><summary><a href="#${section.id}">${section.title}</a></summary><div class="tree">${pageLinks}</div></details>`;
      }).join("");
    }

    function renderToc() {
      toc.innerHTML = sections
        .filter(section => !section.parent)
        .map(section => `<a href="#${section.id}">${section.title}</a>`)
        .join("");
    }

    function renderPageCard(section, page) {
      const [src, title, summary, guidance, tag] = page;
      const id = `${section.id}-${slug(title)}`;
      return `<section class="page-card" id="${id}">
          <h4>${title}</h4>
          <p>${summary}</p>
          <p>${guidance}</p>
          ${shot(src, title)}
        </section>`;
    }

    function renderDeepCard(section, item, heading = "h4") {
      const id = `${section.id}-${slug(item.title)}`;
      const inventory = (item.inventory || []).map(value => `<li>${value}</li>`).join("");
      return `<section class="deep-card" id="${id}">
          ${shot(item.proof, item.title)}
          <div class="deep-body">
            <${heading}>${item.title}</${heading}>
            <p>${item.summary}</p>
            <ul class="mini-list">${item.steps.map(step => `<li>${step}</li>`).join("")}</ul>
            ${inventory ? `<h4>${item.inventoryTitle || "Inventory"}</h4><ul class="inventory">${inventory}</ul>` : ""}
          </div>
        </section>`;
    }

    function renderOrderedChildBody(section) {
      const groups = childNavGroups[section.id] || [];
      const usedPages = new Set();
      const usedDeep = new Set();
      const renderGroup = group => {
        const pages = section.pages.filter(page => !usedPages.has(page) && matchesPrefix(page[1], group.pagePrefixes || [group.title]));
        const deep = (section.deepDive || []).filter(item => {
          if (usedDeep.has(item)) return false;
          const exact = (group.deepTitles || []).includes(item.title);
          const prefixed = matchesPrefix(item.title, group.deepPrefixes || []);
          return exact || prefixed;
        });
        pages.forEach(page => usedPages.add(page));
        deep.forEach(item => usedDeep.add(item));
        const pageCards = pages.map(page => renderPageCard(section, page));
        const deepCards = deep.map(item => renderDeepCard(section, item));
        const childCards = (group.children || []).map(renderGroup);
        return group.deepFirst
          ? [...deepCards, ...pageCards, ...childCards].join("")
          : [...pageCards, ...deepCards, ...childCards].join("");
      };
      const grouped = groups.map(renderGroup).join("");
      const overflow = [
        ...section.pages.filter(page => !usedPages.has(page)).map(page => renderPageCard(section, page)),
        ...(section.deepDive || []).filter(item => !usedDeep.has(item)).map(item => renderDeepCard(section, item))
      ].join("");
      return grouped + overflow;
    }

    function renderChildSection(section, embedded = false) {
      if (flatChildSectionIds.has(section.id)) {
        return `<section id="${section.id}" class="${embedded ? "embedded-section" : ""}">
          ${embedded ? "" : `<h3>${section.title}</h3><p>${section.intro}</p>`}
          ${renderOrderedChildBody(section)}
        </section>`;
      }
      const cards = section.pages.map(page => renderPageCard(section, page)).join("");
      const deep = (section.deepDive || []).map(item => renderDeepCard(section, item)).join("");
      return `<section id="${section.id}" class="${embedded ? "embedded-section" : ""}">
        ${embedded ? "" : `<h3>${section.title}</h3><p>${section.intro}</p>`}
        <div class="grid">${cards}</div>
        ${deep}
      </section>`;
    }

    function renderGuide() {
      const topSections = sections.filter(section => !section.parent);
      guide.innerHTML = topSections.map(section => {
        const children = sections.filter(child => child.parent === section.id);
        const cards = section.pages.map(page => {
          const [src, title, summary, guidance, tag] = page;
          const id = `${section.id}-${slug(title)}`;
          const pageChildren = children.filter(child => child.parentPage === title);
          const embeddedIntros = pageChildren
            .filter(child => flatChildSectionIds.has(child.id))
            .map(child => `<p>${child.intro}</p>`)
            .join("");
          const nested = pageChildren
            .map(child => renderChildSection(child, flatChildSectionIds.has(child.id)))
            .join("");
          return `<section class="page-card" id="${id}">
            <h3>${title}</h3>
            <p>${summary}</p>
            <p>${guidance}</p>
            ${embeddedIntros}
            ${shot(src, title)}
            ${nested}
          </section>`;
        }).join("");
        const deep = (section.deepDive || []).map(item => renderDeepCard(section, item, "h3")).join("");
        return `<section id="${section.id}">
          <h2>${section.title}</h2>
          <p>${section.intro}</p>
          <div class="grid">${cards}</div>
          ${deep}
        </section>`;
      }).join("");
    }

    function applyViewerZoom() {
      if (viewerZoom === 1) {
        viewer.classList.add("fit");
        viewerImage.style.width = "";
      } else {
        viewer.classList.remove("fit");
        viewerImage.style.width = `${Math.round(viewerZoom * 100)}%`;
      }
    }

    function openViewer(src, title) {
      viewer.hidden = false;
      viewerZoom = 1;
      viewerImage.src = src;
      viewerImage.alt = "";
      viewerTitle.textContent = "";
      viewerOriginal.href = src;
      applyViewerZoom();
      viewerClose.focus();
      document.body.style.overflow = "hidden";
    }

    function closeViewer() {
      viewer.hidden = true;
      viewerImage.removeAttribute("src");
      document.body.style.overflow = "";
    }

    function bindInteractions() {
      guide.addEventListener("click", event => {
        const button = event.target.closest(".shot-button");
        if (!button) return;
        openViewer(button.dataset.src, button.dataset.title);
      });

      sidebar.addEventListener("click", event => {
        if (!window.matchMedia("(max-width: 780px)").matches) return;
        const link = event.target.closest("a");
        if (!link) return;
        sidebar.querySelectorAll("details[data-depth]").forEach(details => {
          if (Number(details.dataset.depth) > 0) details.open = false;
        });
      });

      viewerClose.addEventListener("click", closeViewer);
      viewer.addEventListener("click", event => {
        if (event.target === viewer || event.target === viewerStage) closeViewer();
      });
      viewerFit.addEventListener("click", () => {
        viewerZoom = 1;
        applyViewerZoom();
      });
      viewerZoomIn.addEventListener("click", () => {
        viewerZoom = Math.min(3, Number((viewerZoom + .25).toFixed(2)));
        applyViewerZoom();
      });
      viewerZoomOut.addEventListener("click", () => {
        viewerZoom = Math.max(.5, Number((viewerZoom - .25).toFixed(2)));
        applyViewerZoom();
      });
      document.addEventListener("keydown", event => {
        if (viewer.hidden) return;
        if (event.key === "Escape") closeViewer();
        if (event.key === "+" || event.key === "=") viewerZoomIn.click();
        if (event.key === "-") viewerZoomOut.click();
        if (event.key.toLowerCase() === "f") viewerFit.click();
      });
      window.matchMedia("(max-width: 780px)").addEventListener("change", renderSidebar);
    }

    renderSidebar();
    renderToc();
    renderGuide();
    bindInteractions();
  </script>
